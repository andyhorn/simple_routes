name: Publish to pub.dev

on:
  push:
    tags:
      - 'simple_routes-v[0-9]*'
      - 'simple_routes_annotations-v[0-9]*'
      - 'simple_routes_generator-v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. simple_routes_generator-v2.1.4)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pub.dev
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: kuhnroyal/flutter-fvm-config-action/setup@v3
      - name: Restore packages
        run: |
          dart pub global activate melos
          melos bootstrap
      - name: Determine package from tag
        id: package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          PACKAGE_NAME="${TAG%-v*}"
          echo "path=packages/${PACKAGE_NAME}" >> $GITHUB_OUTPUT
      - name: Test
        run: melos run test
      - name: Publish
        working-directory: ${{ steps.package.outputs.path }}
        run: dart pub publish --force
